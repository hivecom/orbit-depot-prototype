# Depot configuration. Copy to depot.toml and edit.
#
# Two orthogonal axes: the storage driver (where bytes live) and the accepted
# credentials (who may call). Compose them freely; nothing is paid for unless
# enabled.

[depot]
listen        = ":3000"
driver        = "s3"                 # "s3" | "fs"
public_url    = "https://depot.example.com" # Depot's external base URL; required for the fs driver
default_place = "uploads"            # place used when a request omits one; unset = always require a named place
# Browser origins allowed to call Depot cross-origin (the web client / website).
# Empty disables CORS; "*" allows any. Needed for browser uploads, not for CLI.
cors_origins  = ["https://hivecom.com"]
# Read the client IP from X-Forwarded-For/X-Real-IP for per-IP rate limiting.
# Enable ONLY behind a trusted reverse proxy (Caddy); otherwise it is spoofable.
trust_forwarded_for = false

# Axis 1a: s3 driver. Any S3-compatible backend (MinIO, R2, B2, Garage, Ceph,
# AWS S3). Depot does not bind to a vendor.
[depot.s3]
endpoint   = "s3.example.com"
bucket     = "orbit-uploads"
region     = "auto"
access_key = "CHANGE_ME"
secret_key = "CHANGE_ME"
use_ssl    = true

# Axis 1b: fs driver (local disk). Depot proxies transfers, so this is
# single-box by nature. Used only when driver = "fs".
[depot.fs]
root = "/var/lib/depot/uploads"

# OIDC verification. Required when credentials.oidc is enabled. Depot verifies
# JWTs against the provider's published JWKS.
#
# issuer is always enforced and is the tenant boundary. audience is optional:
# set it (to the provider's per-client audience, e.g. a Keycloak/Authentik
# client_id) and Depot rejects tokens whose aud does not contain it. Leave it
# blank for providers that mint a generic shared audience - Supabase tokens
# carry aud = "authenticated", which is not per-app, so there the issuer alone
# is the boundary and pinning the audience would add nothing.
[depot.oidc]
issuer   = "https://id.example.com/realms/orbit"
audience = "orbit"                    # optional; omit to rely on issuer only

# Axis 2: accepted credentials, any combination.
[depot.credentials]
anonymous = false
oidc      = true                     # verify Transponder JWTs
api_key   = true                     # ShareX / Puush / upf/ cURL

[depot.limits]
max_file_size       = "100MB"
default_quota       = "500MB"
rate_limit_per_ip   = "30/min"
rate_limit_per_user = "120/min"
oneshot_rate_limit  = "10/min"       # /upload proxies bytes; throttle harder

[depot.quota_overrides]
"botaccount" = "5GB"

# Upload destinations. Every place is declared here; there is no built-in
# default. Define at least one. A permissive place (no allowed_mime, dump key)
# is the catch-all; point default_place at it for place-link-forget ergonomics,
# or leave default_place unset to force every request to name a place. Apps
# point content at a place by name in the presign request.

[depot.places.uploads]
# Permissive catch-all: any MIME up to max_file_size, random per-upload key.
# key defaults to "dump"; prefix defaults to the place name ("uploads").

# Restricted places add their own rules for specific content classes:
#
# [depot.places.avatars]
# prefix           = "orbit/user-content/avatars"
# key              = "account"   # deterministic per account; re-upload overwrites
# max_size         = "2MB"
# allowed_mime     = ["image/png", "image/jpeg", "image/webp"]
# require_identity = true        # implied by key = "account"

# Metadata store. Only needed when a stateful capability (oidc, api_key) is on.
# sqlite for single box, postgres for the horizontal scale path.
[depot.store]
backend = "sqlite"                   # "sqlite" | "postgres"
path    = "/var/lib/depot/depot.db"  # sqlite
# dsn   = "postgres://user:pass@host:5432/depot"  # postgres

# Optional distributed coordination. When enabled, rate limiting is shared
# across instances so Depot scales horizontally (s3 + postgres + redis).
# When disabled, rate limiting is in-memory and single-instance.
[depot.redis]
enabled = false
addr    = "localhost:6379"
# addrs = ["node1:6379", "node2:6379"]  # cluster mode
# password = ""
# db = 0
