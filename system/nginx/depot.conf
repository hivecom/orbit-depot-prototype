# Example nginx reverse proxy for orbit-depot, with download caching.
#
# This applies to the **fs driver**, where Depot proxies every transfer through
# itself. Under fs, a download (GET /transfer/<key>) is served by Depot reading
# the file off whatever disk backs it - which for many deployments is a network
# mount (NFS, sshfs, a storage box). Reads are the hot path: one upload posted
# in a channel gets fetched by everyone who opens it, so reads amplify against
# the slowest link. Caching the download responses on the proxy's local disk
# turns "N fetches from the backend" into "1 fetch + N-1 local hits".
#
# Why this is safe to cache hard:
#   - Downloads are public and unsigned: the URL is the capability, like a
#     public S3 object. There is no per-user auth response to fragment on.
#   - Object keys are unique per upload, so a given URL's bytes never change.
#     Immutable content can be cached effectively forever.
#   - Uploads (PUT /transfer/<key>) share the prefix but are never cached:
#     proxy_cache_methods defaults to GET/HEAD only, so they pass straight
#     through the same location.
#
# Not for the s3 driver: there, Depot hands back a presigned URL and the client
# transfers directly with the object store, so bytes never pass through Depot or
# this proxy. Cache at the bucket / CDN layer instead.

# --- http {} context -------------------------------------------------------
# proxy_cache_path is an http-level directive; put this line in your http {}
# block, not inside server {}. max_size is a soft cap (the cache manager prunes
# on a periodic pass); tune it to the proxy host's free disk.
proxy_cache_path /var/cache/nginx/depot
    keys_zone=depot_cache:10m
    levels=1:2
    use_temp_path=off
    inactive=30d
    max_size=10g;

# --- server {} -------------------------------------------------------------
server {
    listen 443 ssl;
    server_name depot.example.com;

    # ssl_certificate / ssl_certificate_key / protocols: use your usual TLS
    # setup (certbot, acme.sh, your platform's module, etc.).

    # Allow request bodies a little over Depot's max_file_size to cover
    # multipart framing on the one-shot upload path.
    client_max_body_size 110M;

    # Downloads. Public, unsigned, immutable - cache aggressively.
    location /transfer/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache depot_cache;
        # Key on the path only. Downloads carry no query string, so this just
        # stops a stray ?foo from fragmenting or busting the cache.
        proxy_cache_key "$scheme://$host$uri";
        # Cache full (200) and range (206) responses; ranges matter for media
        # seeking and resumable downloads.
        proxy_cache_valid 200 206 30d;
        proxy_cache_valid 404 1m;
        # On expiry, revalidate with If-Modified-Since (Depot's ServeContent
        # sets Last-Modified) and take a 304 instead of re-pulling the bytes.
        proxy_cache_revalidate on;
        # Collapse a stampede: when many clients hit the same cold object at
        # once, one populates the cache and the rest wait, instead of N
        # simultaneous backend fetches.
        proxy_cache_lock on;
        # If the backend is slow or flaky, serve the stale copy rather than
        # erroring or piling onto it.
        proxy_cache_use_stale updating error timeout;
        # Depot sets Last-Modified but not Cache-Control, so browsers and any
        # CDN in front won't cache long on their own. Push it out to them too.
        add_header Cache-Control "public, max-age=31536000, immutable";
        # Observability: curl -sI and check this header (HIT / MISS / EXPIRED).
        add_header X-Cache-Status $upstream_cache_status always;
    }

    # Everything else (presign, upload, key mgmt, quota, health) is dynamic or
    # identity-scoped and must not be cached.
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # The one-shot POST /upload streams bytes; don't buffer the whole
        # request to disk before forwarding it.
        proxy_request_buffering off;
    }
}

# Note on trust_forwarded_for (depot.toml): enabling it makes Depot read the
# client IP from the X-Forwarded-For / X-Real-IP headers set above for per-IP
# rate limiting. Only enable it behind a proxy you control - like this one -
# otherwise the header is spoofable.
